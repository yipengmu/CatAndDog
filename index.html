<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猫狗大作战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="top-bar" aria-label="游戏状态">
        <section class="brand">
          <div class="logo-badge" id="themeBadge" aria-hidden="true">CD</div>
          <div>
            <h1 id="gameTitle">猫狗大作战</h1>
            <p id="gameSubtitle">双人同屏宠物冲冲冲</p>
          </div>
        </section>

        <section class="score-board" aria-label="对战分数">
          <div class="score-card side-left">
            <span id="leftScoreLabel">猫猫队</span>
            <strong id="leftScore">0</strong>
          </div>
          <div class="round-pill" id="roundState">准备</div>
          <div class="score-card side-right">
            <span id="rightScoreLabel">狗狗队</span>
            <strong id="rightScore">0</strong>
          </div>
        </section>

        <section class="mode-switch" id="modeSwitch" aria-label="游戏模式切换"></section>

        <section class="quick-switch" id="quickSwitch" aria-label="题材和背景切换"></section>

        <section class="top-actions">
          <button class="primary-action" type="button" id="startButton">开始对战</button>
          <button class="secondary-action" type="button" id="resetButton">重新开始</button>
        </section>
      </header>

      <section class="mobile-orientation-banner hidden" id="orientationBanner" aria-live="polite">
        <strong id="orientationTitle">单人模式更适合竖屏</strong>
        <span id="orientationText">双人对战请把手机横过来，两个小朋友一人一边更好操作。</span>
      </section>

      <section class="battle-stage garden" id="battleStage" aria-label="对战场地">
        <div class="sky-pop one"></div>
        <div class="sky-pop two"></div>
        <div class="sky-pop three"></div>
        <div class="base base-left" id="leftBase">
          <div class="base-face" id="leftBaseFace">ฅ</div>
          <strong id="leftBaseName">猫猫城堡</strong>
          <span id="leftBaseHp">10</span>
        </div>
        <div class="battle-lanes" id="battleLanes"></div>
        <div class="base base-right" id="rightBase">
          <div class="base-face" id="rightBaseFace">ᴥ</div>
          <strong id="rightBaseName">狗狗城堡</strong>
          <span id="rightBaseHp">10</span>
        </div>
      </section>

      <section class="duel-controls" aria-label="双人出兵控制">
        <article class="player-panel left-player" id="leftPanel">
          <div class="player-head">
            <div>
              <span class="player-kicker">左方玩家</span>
              <strong id="leftPanelName">猫猫队</strong>
            </div>
            <div class="energy-chip"><span class="star-symbol">★</span><span id="leftEnergyText">6 / 10</span></div>
          </div>
          <div class="energy-track">
            <div class="energy-fill left-fill" id="leftEnergyFill"></div>
          </div>
          <div class="lane-picker" id="leftLanePicker"></div>
          <div class="strategy-grid" id="leftStrategyGrid"></div>
        </article>

        <article class="solo-sidekick hidden" id="soloSidekick" aria-label="单人模式对手状态">
          <div class="solo-sidekick-head">
            <span class="player-kicker">对手状态</span>
            <strong id="soloSidekickName">狗狗队 AI</strong>
          </div>
          <p class="solo-sidekick-text" id="soloSidekickText">AI 会自动选路并出兵，你只需要专注自己的操作。</p>
          <div class="solo-sidekick-card" id="soloSidekickCard"></div>
        </article>

        <article class="player-panel right-player" id="rightPanel">
          <div class="player-head">
            <div>
              <span class="player-kicker">右方玩家</span>
              <strong id="rightPanelName">狗狗队</strong>
            </div>
            <div class="energy-chip"><span class="star-symbol">★</span><span id="rightEnergyText">6 / 10</span></div>
          </div>
          <div class="energy-track">
            <div class="energy-fill right-fill" id="rightEnergyFill"></div>
          </div>
          <div class="lane-picker" id="rightLanePicker"></div>
          <div class="strategy-grid" id="rightStrategyGrid"></div>
        </article>
      </section>
    </main>

    <section class="reward-modal hidden" id="rewardModal" aria-live="polite" aria-label="获胜奖励">
      <div class="reward-card">
        <div class="reward-burst" aria-hidden="true">★</div>
        <div class="reward-avatar" id="rewardAvatar"></div>
        <p class="reward-kicker" id="rewardKicker">获胜奖励</p>
        <h2 id="rewardTitle">Congratulations!</h2>
        <p id="rewardMessage">猫猫队赢得了比赛</p>
        <button class="primary-action" type="button" id="rewardRestartButton">再来一局</button>
      </div>
    </section>

    <script src="./animal-assets.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
